# Render deployment configuration
# See: https://render.com/docs/deploy-python

services:
  - type: web
    name: waste-ai-service
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
